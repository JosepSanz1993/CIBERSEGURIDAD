# dnsmasq com a servidor DHCP a la xarxa interna (escenari didàctic).
# NOTA IMPORTANT (llegeix el README): en un bridge de Docker la IPAM la gestiona
# Docker, per la qual cosa aquest DHCP NO competirà de forma realista amb res.
# Perquè els atacs DHCP (starvation / rogue DHCP / DNS forçat) siguin
# realistes cal xarxa `macvlan` o, millor, VMs. Aquí el deixem com a servei
# enumerable i com a base per practicar la captura amb Wireshark.

interface=eth1                 # interfície cap a internal_net
bind-interfaces
dhcp-range=10.10.20.100,10.10.20.150,12h
dhcp-option=3,10.10.20.14      # gateway anunciat
dhcp-option=6,10.10.20.14      # DNS anunciat = oops4 (forcem que passin per nosaltres)
log-dhcp
# fa de resolver reenviant a si mateix per la zona oops.lab
server=/oops.lab/127.0.0.1
