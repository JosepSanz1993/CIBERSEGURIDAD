server {
    listen 80 default_server;
    root /var/www/html;
    index index.php index.html;
    server_name _;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # el socket varia segons versió de PHP a Debian 12 (php8.2)
        fastcgi_pass unix:/run/php/php-fpm.sock;
    }

    # el directori "internal" conté l'enigma; el deixem servible per fer-lo trobable
    location /internal/ {
        autoindex on;
    }
}
