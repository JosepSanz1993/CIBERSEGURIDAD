# dnsmasq per OOPS_4 al segment macvlan (interfície = eth0 dins del contenidor).
# Aquí el DHCP és REAL: reparteix leases a les víctimes del segment 10.10.30.0/24
# i s'anuncia com a DNS (opció 6). Això és el que fa possibles els atacs de
# rogue DHCP / DNS spoofing / DHCP starvation.

interface=eth0
bind-interfaces
dhcp-range=10.10.30.100,10.10.30.200,255.255.255.0,12h
dhcp-option=3,10.10.30.1        # gateway anunciat
dhcp-option=6,10.10.30.14       # DNS anunciat = oops4 (tot passa per nosaltres)
dhcp-authoritative
log-dhcp
log-queries
# resol la zona oops.lab reenviant al BIND local (AXFR obert)
server=/oops.lab/127.0.0.1
